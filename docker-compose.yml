version: '3.8'

services:
  mongodb:
    image: mongo:6-jammy
    container_name: chesshive_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: chesshive_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chesshive_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/chesshive
      - REDIS_URL=redis://redis:6379
      # Add cloudinary/razorpay secrets here when building real containers
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chesshive_frontend
    ports:
      - "3000:80" # Exposed on port 3000, mapped to nginx's internal 80
    depends_on:
      - backend
    environment:
      # React app env vars mapping
      - REACT_APP_BACKEND_URL=http://localhost:5000
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data: