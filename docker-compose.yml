services:
  mongodb:
    image: mongo:6-jammy
    container_name: chesshive_mongodb
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: chesshive_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Optional Solr service for development/search indexing.
  # Enable with: `docker compose --profile solr up`
  solr:
    image: solr:9
    container_name: chesshive_solr
    profiles: ["solr"]
    ports:
      - "8983:8983"
    volumes:
      - solr_data:/var/solr
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chesshive_backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
      # Use MongoDB Atlas (from `./backend/.env`) for production data.
      - REDIS_URL=redis://redis:6379
      - SOLR_ENABLED=${SOLR_ENABLED:-0}
      - SOLR_URL=${SOLR_URL:-http://solr:8983}
      - SOLR_BASE_URL=${SOLR_BASE_URL:-http://solr:8983}
    # Help prevent intermittent `getaddrinfo EAI_AGAIN` when resolving Atlas SRV hosts.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    dns_opt:
      - ndots:0
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  # Optional containerized test runner:
  # `docker compose --profile test run --rm backend-test`
  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: test
    profiles: ["test"]
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=test
      - MONGODB_URI=mongodb://mongodb:27017/chesshive_test
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chesshive_frontend
    ports:
      - "3000:80" # Exposed on port 3000, mapped to nginx's internal 80
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:3001
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:
  solr_data:
